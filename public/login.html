<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PFC Planner | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/auth.css" />
    <script>
      window.va = window.va || function () {
        ;(window.vaq = window.vaq || []).push(arguments)
      }
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
  </head>
  <body data-auth-mode="login">
    <main class="auth-layout">
      <section class="auth-card">
        <h1>Welcome Back</h1>
        <p>Log in to continue to your planner.</p>

        <div id="auth-error" class="auth-error hidden" role="alert"></div>

        <form id="login-form" class="auth-form">
          <label for="login-email">Email</label>
          <input id="login-email" type="email" autocomplete="email" required />

          <label for="login-password">Password</label>
          <input id="login-password" type="password" autocomplete="current-password" required />

          <button id="login-submit" class="primary" type="submit">Log in</button>
        </form>

        <p class="auth-footnote">
          New here?
          <a href="/signup.html">Create an account</a>
        </p>
      </section>
    </main>

    <script type="module" src="/auth.js"></script>
  </body>
</html>
